.lts{display:flex;gap:3px;flex-wrap:wrap;justify-content:center}
.lt{background:linear-gradient(135deg,#fff6ed,#fff);border:2px solid #f7931e;border-radius:5px;width:32px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1em;cursor:pointer;transition:all .15s;color:#d47500}

</div>

<div id="gameScreen">

  </div>

    <div class="opts" id="gOpts"></div>
    <div class="tfr" id="gTF" style="display:none"></div>
    <div class="wa" id="gWord" style="display:none">
      <div class="sls" id="gSlts"></div>
      <div class="lts" id="gLts"></div>
      <button class="exitb" onclick="rstWord()"><i class="fa-solid fa-rotate"></i> Reiniciar</button>

      <button class="nbtn sm" onclick="ckFill()"><i class="fa-regular fa-circle-check"></i> Comprobar</button>
    </div>
  </div>
  <div class="bbar">
    <span class="ctr" id="gCtr">1/10</span>
    <button class="nbtn" id="gNbtn" onclick="nextQ()">Siguiente <i class="fa-solid fa-arrow-right"></i></button>
  </div>
</div>

<div class="modal" id="modalEnd">
  <div class="mc">
    <div class="micon" id="endIcon">&#x1F389;</div>
    <h2 id="endTitle">INCREIBLE!</h2>
    <div class="bigs" id="endScore">0 pts</div>
    <div class="subs" id="endMsg"></div>
    <button class="mb" onclick="closeEnd(true)"><i class="fa-solid fa-rotate"></i> Otra vez</button>
    <button class="mb sec" onclick="closeEnd(false)"><i class="fa-solid fa-house"></i> Menu</button>
  </div>
</div>

<div id="toast"></div>

<div class="modal" id="modalFb" style="align-items:flex-start;padding-top:15vh">
  <div class="mc" style="text-align:left">
    <div id="mfbIcon" style="font-size:1.8em;text-align:center">&#x2705;</div>
    <h2 id="mfbTitle" style="text-align:center">Correcto!</h2>
    <p id="mfbMsg" style="text-align:center"></p>
    <button class="mb" id="mfbBtn" onclick="closeFb()" style="display:block;margin:0 auto"><i class="fa-solid fa-arrow-right"></i> Continuar</button>
  </div>
</div>

  scramble: [

{word:'MONOMODO',hint:'Fibra de nucleo fino, larga distancia',cat:'Fibra'},
{word:'MULTIMODO',hint:'Fibra de nucleo grande, corta distancia',cat:'Fibra'},
{word:'SPLITTER',hint:'Divisor de senal optica',cat:'Fibra'},

{word:'SSID',hint:'Nombre de red WiFi',cat:'WiFi'},

],
  fill: [

{q:'Licencia usuarios ilimitados: Level ___',ans:'6',cat:'MikroTik'},

{q:'OLT = Optical Line ___',ans:'Terminal',cat:'Fibra'},

{q:'Pais origen MikroTik: ___',ans:'Letonia',cat:'MikroTik'},
{q:'Puerto Winbox default: ___',ans:'8291',cat:'MikroTik'}
],
  scenario: [
{desc:'Admin de empresa con 30 PCs. MikroTik RB951G-2HnD. ISP da IP por DHCP. Que haces?',opts:['ether1 a ISP, DHCP Client, Bridge LAN ether2-5, IP 192.168.1.1/24, DHCP Server, NAT masquerade', 'Conectar todo a ether1, IP fija, sin NAT', 'Solo WiFi, no configurar puertos LAN', 'Misma IP en todos los puertos, sin Bridge'],ans:0,cat:'Caso Practico'},
{desc:'Cliente no accede a YouTube. Jefe pide bloquearlo. Como?',opts:['Bloquear puerto 80', "Layer7 regex '^.+(youtube|googlevideo).+$' + regla Forward DROP", 'Eliminar DNS de YouTube', 'Apagar router 9am'],ans:1,cat:'Firewall'},
{desc:'Servidor web 192.168.1.50:80 accesible desde Internet. Config?',opts:['NAT dstnat: chain=dstnat, protocol=tcp, dst-port=80, in-interface=WAN, action=dstnat, to-address=192.168.1.50', 'DMZ sin reglas', 'Ping al servidor', 'Solo DHCP'],ans:0,cat:'Firewall'},
{desc:'ISP necesita conectar 16 aptos con fibra. Arquitectura?',opts:['Red PON: OLT central -> Splitter 1x16 -> ONU/ONT cada apto', 'Switch gigante en la calle con 16 cables', '16 routers independientes', 'Solo WiFi central'],ans:0,cat:'Fibra'},
{desc:'Cable fibra no pasa luz. Tienes laser visualizador. Que haces?',opts:['Laser en extremo, ver luz escapando = rotura, empalmar con fusionadora o fast connector', 'Tirar cable hasta estirar', 'Cortar ambos extremos sin revisar', 'Usar tester Ethernet'],ans:0,cat:'Fibra'},
{desc:'Olvidaste password admin MikroTik nuevo. Como recuperas acceso?',opts:['No se puede, comprar otro', 'Reset con boton reset durante arranque, borra config', 'Llamar a MikroTik', 'SSH con user root'],ans:1,cat:'MikroTik'},
{desc:'Jefe pide WiFi invitados separada de red interna. Implementacion?',opts:['WiFi Virtual (Virtual AP) con otro SSID, Security Profile, Default Forward off, otro Bridge y DHCP', 'Misma WiFi para todos', 'Deshabilitar WiFi', 'Router distinto'],ans:0,cat:'WiFi'},
{desc:'Alguien hace port scan a MikroTik desde Internet. Proteccion?',opts:["Firewall: detectar con 'psd=21,3s,3,1', agregar a lista bloqueados, DROP", 'Cambiar IP cada hora', 'Apagar router noche', 'Password mas larga'],ans:0,cat:'Seguridad'},
{desc:'Backup completo incluyendo usuarios y passwords. Tipo?',opts:['Backup encriptado .backup (System -> Backup), restaura desde Files -> Restore', 'Backup .rsc texto plano sin passwords', 'Copiar config a mano', 'Exportar cada seccion'],ans:0,cat:'MikroTik'},
{desc:'Interconectar 2 edificios separados 2 km con fibra. Que recomiendas?',opts:['Fibra monomodo OS2 con conectores SC/APC, soporta larga distancia, baja atenuacion', 'Fibra multimodo OM3 mas barata', 'UTP Cat6 mas facil', 'Monomodo conectores ST'],ans:0,cat:'Fibra'}
]
};

let S = {};

function pickM(el) {
  document.querySelectorAll('.mopt').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
}

function startG() {
  const mode = document.querySelector('.mopt.sel').dataset.m;
  const qty = parseInt(document.querySelector('input[name="qty"]:checked').value) || 0;
  const pool = data[mode]; const total = qty > 0 ? Math.min(qty, pool.length) : pool.length;
  const idx = [...Array(pool.length).keys()]; for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  S = {mode,pool,idx:idx.slice(0,total),total,cur:0,score:0,ok:0,streak:0,best:0,sel:false,placed:[],avail:[],word:''};
  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameScreen').style.display='flex';
  const lb = {quiz:'Quiz',truefalse:'V/F',scramble:'Palabras',fill:'Completar',scenario:'Casos'};
  document.getElementById('gMode').textContent = lb[mode];
  rQ();
}

function exitG() {
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('startScreen').style.display='flex';
}

function uSt() {
  document.getElementById('gScore').textContent = S.score;
  document.getElementById('gStreak').textContent = S.streak;
  document.getElementById('gPct').textContent = S.cur > 0 ? Math.round(S.ok/S.cur*100)+'%' : '0%';
  document.getElementById('gCtr').textContent = Math.min(S.cur+1,S.total)+'/'+S.total;
  document.getElementById('gProg').style.width = (S.cur/S.total*100)+'%';
}

function toast(t, err) {
  const el = document.getElementById('toast');
  el.innerHTML = '<div class="toast-inner' + (err ? ' err' : '') + '"><i class="' + (err ? 'fa-solid fa-circle-exclamation' : 'fa-regular fa-circle-check') + '" style="font-size:1.3em;' + (err ? 'color:#dc3545' : 'color:#28a745') + '"></i><span class="ti">' + t + '</span></div>';
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', 2000);
}

function showFb(t, msg) {
  var ok = t === 'ok';
  new Audio('sounds/' + (ok ? 'mario-1-up' : 'error-soundss') + '.mp3').play();
  document.getElementById('mfbIcon').innerHTML = ok ? '\u2705' : '\u274C';
  document.getElementById('mfbTitle').innerHTML = ok ? '\u2705 Correcto!' : '\u274C Incorrecto';
  document.getElementById('mfbMsg').innerHTML = msg;
  document.getElementById('modalFb').style.display = 'flex';
}

function closeFb() {
  document.getElementById('modalFb').style.display = 'none';
}

function rQ() {
  if (S.cur >= S.total) { showEnd(); return; }
  S.sel = false;
  const idx = S.idx[S.cur];
  const q = S.pool[idx];
  document.getElementById('gCat').textContent = q.cat || '';
  document.getElementById('gOpts').style.display = 'none';
  document.getElementById('gTF').style.display = 'none';
  document.getElementById('gWord').style.display = 'none';
  document.getElementById('gFillC').style.display = 'none';

  if (S.mode === 'quiz' || S.mode === 'scenario') {
    document.getElementById('gQ').textContent = q.q || q.desc;
    document.getElementById('gOpts').style.display = 'flex';
    document.getElementById('gOpts').innerHTML = q.opts.map((o,i) =>
      '<div class="opt" onclick="sOpt(this,' + i + ')">' + o + '</div>'
    ).join('');
  } else if (S.mode === 'truefalse') {
    document.getElementById('gQ').textContent = q.q;
    document.getElementById('gTF').style.display = 'flex';
    document.getElementById('gTF').innerHTML =
      '<button class="tv" onclick="sTF(this,true)"><i class="fa-regular fa-circle-check"></i> Verdadero</button>' +
      '<button class="fv" onclick="sTF(this,false)"><i class="fa-regular fa-circle-xmark"></i> Falso</button>';
  } else if (S.mode === 'scramble') {
    document.getElementById('gQ').textContent = q.hint;
    document.getElementById('gWord').style.display = 'flex';
    S.word = q.word;
    const lt = q.word.split('');
    S.avail = [...lt]; for(let i=S.avail.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[S.avail[i],S.avail[j]]=[S.avail[j],S.avail[i]];}
    S.placed = [];
    rW();
  } else if (S.mode === 'fill') {
    document.getElementById('gFillC').style.display = 'flex';
    document.getElementById('gQ').innerHTML = q.q.replace('___','<span style="color:#d47500;font-weight:700">___</span>');
    const inp = document.getElementById('gFinp');
    inp.value = ''; inp.className = 'finp'; inp.disabled = false;
    setTimeout(() => inp.focus(), 50);
  }
  uSt();
  document.getElementById('gNbtn').innerHTML = (S.cur >= S.total-1) ? '<i class="fa-solid fa-trophy"></i> Ver resultado' : 'Siguiente <i class="fa-solid fa-arrow-right"></i>';
}

function rW() {
  document.getElementById('gSlts').innerHTML = S.word.split('').map((_,i) =>
    '<div class="sl' + (S.placed[i] ? ' f' : '') + '">' + (S.placed[i] || '') + '</div>'
  ).join('');
  document.getElementById('gLts').innerHTML = S.avail.map((l,i) =>
    '<div class="lt" onclick="pL(' + i + ')">' + l + '</div>'
  ).join('');
}

function pL(i) {
  if (S.sel) return;
  const l = S.avail[i]; if (!l) return;
  S.avail.splice(i,1); S.placed.push(l); rW();
}

function rstWord() {
  if (S.sel) return;
  const w = S.word; S.avail = w.split('');
  for(let i=S.avail.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[S.avail[i],S.avail[j]]=[S.avail[j],S.avail[i]];}
  S.placed = []; rW();
}

function sOpt(el, i) {
  if (S.sel) return; S.sel = true;
  const q = S.pool[S.idx[S.cur]];
  document.querySelectorAll('#gOpts .opt').forEach(o => o.classList.add('dis'));
  if (i === q.ans) { el.classList.add('cr'); addP(S.mode==='scenario'?20:10,''); }
  else { el.classList.add('wr'); document.querySelectorAll('#gOpts .opt')[q.ans].classList.add('cr'); addP(0,''); }
}

function sTF(el, v) {
  if (S.sel) return; S.sel = true;
  const q = S.pool[S.idx[S.cur]];
  document.querySelectorAll('#gTF button').forEach(b => b.disabled = true);
  if (v === q.ans) { el.classList.add('cr'); addP(5,''); }
  else { el.classList.add('wr'); document.querySelectorAll('#gTF button').forEach(b => { if((b.classList.contains('tv')&&q.ans)||(b.classList.contains('fv')&&!q.ans)) b.classList.add('cr'); }); addP(0,''); }
}

function ckFill() {
  if (S.sel) return;
  const inp = document.getElementById('gFinp');
  if (!inp.value.trim()) { toast('Escribe algo!', true); return; }
  S.sel = true;
  const q = S.pool[S.idx[S.cur]];
  const ok = inp.value.trim().toUpperCase() === q.ans.toUpperCase();
  if (ok) { inp.className = 'finp cr'; inp.disabled = true; addP(10,''); }
  else { inp.className = 'finp wr'; inp.disabled = true; addP(0,'Respuesta: <b>' + q.ans + '</b>'); }
}

function addP(pts, extra) {
  S.cur++;
  if (pts > 0) { const b = S.streak >= 3 ? 10 : S.streak >= 2 ? 5 : 0; S.score += pts + b; S.ok++; S.streak++; if (S.streak > S.best) S.best = S.streak; }
  else { S.streak = 0; }
  uSt();
  var em = pts > 0 ? winMsgs[Math.floor(Math.random() * winMsgs.length)] : failMsgs[Math.floor(Math.random() * failMsgs.length)];
  var html = em;
  if (pts > 0 && S.streak >= 2) html += '<br><span style="color:#d47500;font-weight:600">\uD83D\uDD25 Racha de ' + S.streak + '!</span>';
  if (pts > 0) html += '<br><span style="color:#28a745;font-weight:600">+' + pts + ' pts</span>';
  if (extra) html += '<br>' + extra;
  showFb(pts > 0 ? 'ok' : 'fail', html);
}

function nextQ() {
  if (S.mode === 'scramble') {
    if (S.sel) { closeFb(); advance(); return; }
    const ans = S.placed.join('');
    if (ans.length < S.word.length) { toast('Coloca todas las letras!', true); return; }
    S.sel = true;
    if (ans.toUpperCase() === S.word.toUpperCase()) { addP(15,''); }
    else { addP(0,'Era: <b>' + S.word + '</b>'); }
    return;
  }
  if (!S.sel && S.mode !== 'fill') { toast('Selecciona una respuesta!', true); return; }
  if (S.mode === 'fill' && !S.sel) { toast('Comprueba tu respuesta!', true); return; }
  closeFb(); advance();
}

function advance() {
  if (S.cur < S.total) rQ(); else showEnd();
}

function showEnd() {
  const pct = S.total > 0 ? Math.round(S.ok/S.total*100) : 0;
  new Audio('sounds/' + (pct >= 50 ? 'win-gameshow' : 'losssss') + '.mp3').play();
  document.getElementById('endScore').textContent = S.score + ' pts';
  let icon, t, m;
  if (pct >= 90) { icon = '&#x1F389;'; t = 'INCREIBLE!'; m = S.ok + '/' + S.total + ' (' + pct + '%) - Eres un experto!'; }
  else if (pct >= 70) { icon = '&#x1F31F;'; t = 'MUY BIEN!'; m = S.ok + '/' + S.total + ' (' + pct + '%) - Solido conocimiento!'; }
  else if (pct >= 50) { icon = '&#x1F4AA;'; t = 'BUEN TRABAJO!'; m = S.ok + '/' + S.total + ' (' + pct + '%) - Sigue practicando!'; }
  else { icon = '&#x1F4DA;'; t = 'SIGUE INTENTANDO!'; m = S.ok + '/' + S.total + ' (' + pct + '%) - Repasa la guia!'; }
  document.getElementById('endIcon').innerHTML = icon;
  document.getElementById('endTitle').textContent = t;
  document.getElementById('endMsg').innerHTML = m + '<br>Racha maxima: ' + S.best;
  document.getElementById('modalEnd').style.display = 'flex';
}

function closeEnd(again) {
  document.getElementById('modalEnd').style.display = 'none';
  if (again) startG(); else exitG();
}
</script>
